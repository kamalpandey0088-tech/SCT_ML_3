upstream fastapi_backend {
    server api:8000;
    keepalive 32;
}

# ── Rate limiting zones ────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS Server ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name neuralpaw.example.com;

    # SSL
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Root — serve React build
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://neuralpaw.example.com" always;

    # ── Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_vary          on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/wasm;

    # ── Client Upload Size ───────────────────────────────────────────────
    client_max_body_size 12M;   # Slightly above 10M to let FastAPI return 413

    # ── Static Assets (React build) ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML for a short period (revalidation)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        # Cache JS/CSS/fonts aggressively (Vite hashes filenames)
        location ~* \.(js|css|woff2?|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        # Cache images
        location ~* \.(png|jpg|jpeg|webp|svg|ico)$ {
            add_header Cache-Control "public, max-age=86400";
            expires 1d;
        }
    }

    # ── API Proxy → FastAPI ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://fastapi_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for large model inference
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffer tuning for large base64 gradcam responses
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # ── Upload endpoint — separate limit ────────────────────────────────
    location /api/v1/predict {
        limit_req zone=upload_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://fastapi_backend/api/v1/predict;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ── Prometheus metrics — internal only ──────────────────────────────
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://fastapi_backend/metrics;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
    }

    # ── Block common attack paths ────────────────────────────────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(php|asp|aspx|jsp)$ {
        deny all;
        return 404;
    }

    # ── Error pages ──────────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 429              /429.json;
    error_page 500 502 503 504  /50x.json;

    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Rate Limit Exceeded","detail":"Too many requests. Please slow down."}';
    }

    location = /50x.json {
        internal;
        default_type application/json;
        return 500 '{"error":"Server Error","detail":"An unexpected error occurred."}';
    }
}
